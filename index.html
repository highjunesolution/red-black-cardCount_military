<!doctype html>
<html lang="en">
  <head>
    <title>Red Card - Lucky</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link rel="shortcut icon" href="./assets/image/medal.png" type="image/x-icon">

    <!-- Bootstrap CSS v5.2.1 -->
    <link rel="stylesheet" href="./assets/bootstrap/css/bootstrap.min.css">
  </head>

  <body>
    <div class="row min-vh-100 g-0">
      <div id="left" class="col-12 d-flex flex-column">
        <button
          class="btn flex-fill bg-danger d-flex flex-column gap-2 justify-content-center align-items-center"
          id="redBtn"
        >
          <h1 class="display-1 text-white fw-bold" id="red">100</h1>
          <p
            class="p-3 bg-danger-subtle fw-bold text-danger rounded-2 w-50"
            id="redPercent"
          >
            100%
          </p>
        </button>
        <button
          class="btn flex-fill bg-black d-flex flex-column gap-2 justify-content-center align-items-center"
          id="blackBtn"
        >
          <h1 class="display-1 text-white fw-bold" id="black">200</h1>
          <p
            class="p-3 bg-secondary-subtle fw-bold text-secondary rounded-2 w-50"
            id="blackPercent"
          >
            100%
          </p>
        </button>
      </div>
      <div
        id="right"
        class="d-none col-12 col-md-4 col-xl-2 d-flex flex-column vh-100"
      >
        <!-- HEADER -->
        <div
          class="bg-success-subtle p-3 d-flex justify-content-between align-items-center"
        >
          <button
            class="btn btn-primary"
            id="resetBtn"
          >
            Reset
          </button>
          <div class="d-flex flex-column text-center text-success">
            <h4 class="m-0 fw-bold">จำนวนทั้งหมด</h4>
            <h4 id="totalCount" class="m-0">20 ใบ</h4>
          </div>
        </div>

        <!-- LIST -->
        <div id="list" class="flex-fill bg-primary-subtle p-3 overflow-y-auto">
          <!-- <div 
            class="d-flex align-items-center bg-light shadow rounded p-2 mb-2 gap-2"
          >
            <p class="m-0 ">1</p>
            <p class="m-0 me-auto">🔴</p>
            <p class="m-0 ">16:00</p>
            <button class="btn btn-danger btn-sm">ลบ</button>
          </div> -->
        </div>
      </div>
    </div>

    <!-- Modal Body -->
    <!-- if you want to close by clicking outside the modal, delete the last endpoint:data-bs-backdrop and data-bs-keyboard -->
    <div
      class="modal fade"
      id="modal"
      tabindex="-1"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
      role="dialog"
      aria-labelledby="modalTitleId"
      aria-hidden="true"
    >
      <div
        class="modal-dialog modal-dialog-scrollable modal-dialog-centered modal"
        role="document"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title" id="modalTitleId">ระบุจำนวนใบดำใบแดง</h4>
          </div>
          <div class="modal-body">
            <div class="d-flex flex-column gap-2">
              <div class="d-flex gap-2">
                <div class="bg-danger w-25"></div>
                <input
                  type="number"
                  class="form-control"
                  placeholder="ระบุจำนวนใบแดง"
                  id="redInput"
                />
              </div>
              <div class="d-flex gap-2">
                <div class="bg-black w-25"></div>
                <input
                  type="number"
                  class="form-control"
                  placeholder="ระบุจำนวนใบดำ"
                  id="blackInput"
                />
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
              id="closeModalBtn"
              hidden
            >
              Close
            </button>
            <button type="button" class="btn btn-primary" id="saveBtn">
              Save
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="./assets/bootstrap/popper/popper.min.js"></script>

    <script src="./assets/bootstrap/js/bootstrap.min.js"></script>

    <!-- Optional: Place to the bottom of scripts -->
    <script src="script.js"></script>
  </body>
</html>
